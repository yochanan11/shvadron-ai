<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>תודה! | shvadron.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#060d1f;color:#fff;direction:rtl;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.box{max-width:500px}
.check{width:80px;height:80px;background:linear-gradient(135deg,#2edebf,#0f8eea);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;font-size:2.5rem}
h1{font-size:2.2rem;font-weight:900;margin-bottom:16px}
h1 span{background:linear-gradient(135deg,#2edebf,#0f8eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:rgba(255,255,255,.6);font-size:1.05rem;line-height:1.8;margin-bottom:32px}
a{display:inline-block;background:linear-gradient(135deg,#2edebf,#0f8eea);color:#060d1f;padding:14px 40px;border-radius:100px;font-weight:800;text-decoration:none;font-size:1rem}
</style>
</head>
<body>
<div class="box">
  <div class="check">✓</div>
  <h1>קיבלתי <span>תודה!</span></h1>
  <p>הפרטים שלך הגיעו אלי. אחזור אליך תוך 24 שעות עם כל המידע על הקורס.</p>
  <a href="index.html">חזרה לאתר</a>
</div>
</body>
</html>
